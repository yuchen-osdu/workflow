components:
  schemas:
    UpdateWorkflowRunRequest:
      type: object
      properties:
        status:
          type: string
          enum:
          - submitted
          - running
          - finished
          - failed
          - success
          - queued
    WorkflowRunResponse:
      type: object
      properties:
        workflowId:
          type: string
          description: Workflow id for the workflow
        runId:
          type: string
          description: Run id for the workflow
        startTimeStamp:
          type: string
          format: int64
          description: Start timestamp of the workflow run.Epoch time stamp
        endTimeStamp:
          type: string
          format: int64
          description: End timestamp of the workflow run.Epoch timestamp
        status:
          type: string
          description: Task execution status
          enum:
          - INPROGRESS
          - PARTIAL_SUCCESS
          - SUCCESS
          - FAILED
          - SUBMITTED
        submittedBy:
          type: string
          description: System captured user details which triggered the run
    AppError:
      type: object
      description: Standard error response returned by OSDU services.
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        reason:
          type: string
          description: Short error reason.
          example: Bad Request
        message:
          type: string
          description: Detailed error message.
          example: Invalid record format.
    CreateWorkflowRequest:
      type: object
      properties:
        workflowName:
          type: string
          description: Workfow name given as input from user while deploying the workflow
        description:
          type: string
          description: Description of workflow provided by user at time of creation
            of workflow
        registrationInstructions:
          type: object
          additionalProperties:
            type: object
          description: |-
            Workfow registration instructions which could contains:

            Name of already registered Airflow DAG
            Content of python DAG file
            etc By default this is Airflow DAG named workflowName
      required:
      - registrationInstructions
    WorkflowMetadata:
      type: object
      properties:
        workflowId:
          type: string
          description: "System generated id, which uniquely recongnizes a workflow."
        workflowName:
          type: string
          description: Workfow name given as input from user while deploying the workflow.
        description:
          type: string
          description: Description of workflow provided by user at time of creation
            of workflow.
        createdBy:
          type: string
          description: System captured user info who created workflow.
        creationTimestamp:
          type: string
          format: int64
          description: System date of creation of workflow.Epoch tiemstamp.
        version:
          type: string
          format: int32
          description: Sematic versions of workflow. These numbers are assigned in
            increasing order and correspond to edits\modifications to workflow definitions.
        isDeployedThroughWorkflowService:
          type: boolean
          writeOnly: true
        registrationInstructions:
          type: object
          additionalProperties:
            type: object
          description: |-
            Workfow registration instructions which could contains:

            Name of already registered Airflow DAG
            Cotent of python DAG file
            etc By default this is Airflow DAG named workflowName
        isSystemWorkflow:
          type: boolean
          writeOnly: true
    TriggerWorkflowRequest:
      type: object
      properties:
        runId:
          type: string
          description: Optional. Explicit setting up workflow run id.
        executionContext:
          type: object
          additionalProperties:
            type: object
          description: Map to configure workflow speciffic key value pairs
    WorkflowRun:
      type: object
      description: Reperesent one workflow run.
      properties:
        workflowId:
          type: string
          description: Workflow id for the workflow
        workflowName:
          type: string
          description: Workflow id for the workflow
        runId:
          type: string
          description: Run id for the workflow
        startTimeStamp:
          type: string
          format: int64
          description: Start timestamp of the workflow run.Epoch time stamp
        endTimeStamp:
          type: string
          format: int64
          description: End timestamp of the workflow run.Epoch timestamp
        status:
          type: string
          description: Task execution status
          enum:
          - submitted
          - running
          - finished
          - failed
          - success
          - queued
        submittedBy:
          type: string
          description: System captured user details which triggered the run.
        workflowEngineExecutionDate:
          type: string
    ConnectedOuterService:
      type: object
      description: Name and version of an external service that this OSDU service
        connects to.
      properties:
        name:
          type: string
          description: Name of the connected external service.
          example: storage
        version:
          type: string
          description: Version of the connected external service.
          example: 2.0.0
    FeatureFlagState:
      type: object
      description: State of a feature flag for a given partition and source.
      properties:
        name:
          type: string
          description: Name of the feature flag.
          example: collaborations-api
        enabled:
          type: boolean
          description: Whether the feature flag is currently enabled.
          example: true
        partition:
          type: string
          description: Data partition this flag applies to.
          example: opendes
        source:
          type: string
          description: Source configuration that provided this flag state.
          example: runtime
    VersionInfo:
      type: object
      description: Version and build information for an OSDU service.
      properties:
        groupId:
          type: string
          description: Maven group ID of the service artifact.
          example: org.opengroup.osdu
        artifactId:
          type: string
          description: Maven artifact ID of the service.
          example: os-search
        version:
          type: string
          description: Semantic version of the deployed service.
          example: 0.27.0
        buildTime:
          type: string
          description: ISO 8601 timestamp of the build.
          example: 2021-01-26T02:24:13.843Z
        branch:
          type: string
          description: Source control branch from which the service was built.
          example: main
        commitId:
          type: string
          description: Short commit SHA of the build.
          example: "7777777"
        commitMessage:
          type: string
          description: Commit message of the build.
          example: initial commit
        connectedOuterServices:
          type: array
          description: List of external services this service depends on.
          items:
            $ref: "#/components/schemas/ConnectedOuterService"
        featureFlagStates:
          type: array
          description: "Current feature flag states for this partition, if any."
          items:
            $ref: "#/components/schemas/FeatureFlagState"
  examples:
    ExternalWorkflowExample:
      value:
        registrationInstructions:
          externalAirflowSecret: external_airflow_secret
          dagName: airflow_monitoring
        description: "This is an example of creating a workflow that executes on external\
          \ Airflow. Configuration should be provided via Secret service. Details\
          \ in the README: https://community.opengroup.org/osdu/platform/data-flow/ingestion/ingestion-workflow/-/tree/master#external-airflow-support"
        workflowName: external_airflow_example
  securitySchemes:
    Authorization:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: Authorization
