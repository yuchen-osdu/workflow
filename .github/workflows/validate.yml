name: Validation

on:
  # No paths-ignore here: validate.yml must always trigger on PRs to a protected branch so the
  # required "🐳 Docker Build" summary check always reports (a path-skipped workflow stays Pending
  # and wedges the PR; a path-skipped heavy job is gated below via check-paths instead). ADR-030.
  pull_request:
    branches: [main, fork_integration, fork_upstream]
  pull_request_target:
    branches: [main, fork_integration, fork_upstream]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '.github/workflows/**'
      - '.github/template-workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/actions/**'
      - '.github/*.md'
      - '.github/*.json'
      - '.github/*.yml'
      - '.github/*.yaml'
      - '.github/.template-sync-commit'
      - '.vscode/**'
      - 'docs/**'
      - '**.md'
      - '**.txt'
      - 'LICENSE'
      - 'NOTICE'
  push:
    branches: [main, fork_integration, fork_upstream]
    paths-ignore:
      - '.github/workflows/**'
      - '.github/template-workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/actions/**'
      - '.github/*.md'
      - '.github/*.json'
      - '.github/*.yml'
      - '.github/*.yaml'
      - '.github/.template-sync-commit'
      - '.vscode/**'
      - 'docs/**'
      - '**.md'
      - '**.txt'
      - 'LICENSE'
      - 'NOTICE'
  workflow_dispatch:
    inputs:
      post_init:
        description: 'Is this a post-initialization validation?'
        required: false
        type: boolean
        default: false
      initialization_complete:
        description: 'Force initialization status (used during post-init)'
        required: false
        type: boolean
        default: false
      # Declared by W13 (#9), inert until W5a/W5b reference it. Lets an operator force a full
      # docker-push -> deploy -> integration-test run on the current HEAD even for paths-ignored
      # events (e.g. after a template-sync PR brings workflow/action changes into a fork). The
      # `if:` wiring lives in the docker-push job (W5a) and the deploy/integration-test jobs
      # (W5b) -- this slot only declares the input. Run me after template-sync to verify workflow
      # changes still pass the full pipeline.
      force_full_pipeline:
        description: 'Force the full docker-push + deploy + integration-test pipeline on the current HEAD (used after template-sync to verify workflow changes).'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  check-initialization:
    name: "🔍 Check Initialization Status"
    # Skip automatic runs during initialization - only run on manual trigger or PR
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       (github.actor == 'app/github-actions' || github.actor == 'github-actions[bot]' || github.actor == 'dependabot[bot]')) ||
      (github.event_name == 'push' && 
       !contains(github.event.head_commit.message, 'chore: complete repository initialization') &&
       !contains(github.event.head_commit.message, 'chore: clean up template files after initialization'))
    runs-on: ubuntu-latest
    outputs:
      initialized: ${{ steps.check.outputs.initialized }}
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # For pull_request_target, we need to check out the PR head to validate the actual changes
          # For pull_request, this will be the same as the default behavior
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
        
      - name: "Verify Initialization Status"
        id: check
        run: |
          # Debug: Check all possible initialization indicators
          echo "🔍 Debug: Event name = '${{ github.event_name }}'"
          echo "🔍 Debug: Repository variable INITIALIZATION_COMPLETE = '${{ vars.INITIALIZATION_COMPLETE }}'"
          echo "🔍 Debug: Workflow input initialization_complete = '${{ inputs.initialization_complete }}'"
          echo "🔍 Debug: Workflow input post_init = '${{ inputs.post_init }}'"
          
          # Check initialization status with multiple fallbacks
          INITIALIZED=false
          
          # 1. If this is a manual trigger with initialization_complete input, use that
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.initialization_complete }}" = "true" ]; then
            INITIALIZED=true
            echo "✅ Initialization confirmed via workflow input"
          # 2. Check repository variable (for non-manual triggers)
          elif [ "${{ vars.INITIALIZATION_COMPLETE }}" = "true" ]; then
            INITIALIZED=true
            echo "✅ Initialization confirmed via repository variable"
          # 3. Fallback: check for structural indicators (branches + Java code)
          else
            echo "🔍 Checking structural indicators for initialization..."
            if git ls-remote --heads origin | grep -q "refs/heads/fork_upstream" && \
               git ls-remote --heads origin | grep -q "refs/heads/fork_integration" && \
               ([ -f "pom.xml" ] || [ -n "$(find . -name 'pom.xml' -type f 2>/dev/null)" ]); then
              INITIALIZED=true
              echo "✅ Initialization detected via structural indicators"
            fi
          fi
          
          if [ "$INITIALIZED" = "true" ]; then
            echo "initialized=true" >> $GITHUB_OUTPUT
            echo "✅ Repository is initialized"
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
            echo "⏸️ Repository not yet initialized"
          fi

  check-repo-state:
    name: "🔍 Check Repository State"
    needs: check-initialization
    if: needs.check-initialization.outputs.initialized == 'true'
    runs-on: ubuntu-latest
    outputs:
      is_initialized: ${{ steps.check_init.outputs.initialized }}
      is_java_repo: ${{ steps.check_java.outputs.is_java }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # For pull_request_target, we need to check out the PR head to validate the actual changes
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
      
      - name: "Check Repository Initialization"
        id: check_init
        run: |
          # Check for key files that indicate repo is initialized
          if [ -f "pom.xml" ] || [ -d "src" ]; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: "Check if Java Repository"
        id: check_java
        run: |
          if [ -f "pom.xml" ] || [ -n "$(find . -name 'pom.xml' -type f)" ]; then
            echo "is_java=true" >> $GITHUB_OUTPUT
          else
            echo "is_java=false" >> $GITHUB_OUTPUT
          fi

  check-paths:
    name: "🔍 Check for Build-Relevant Changes"
    needs: check-initialization
    if: needs.check-initialization.outputs.initialized == 'true'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # For pull_request_target, diff against the PR head; pull_request resolves to the merge sha.
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: "Check for build-relevant changes"
        id: filter
        run: |
          # push / workflow_dispatch always count as build-relevant.
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Build-relevant: ${{ github.event_name }} trigger"
            exit 0
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Build-relevant: unable to determine changed files"
            exit 0
          fi

          # Config-only ignore set (mirrors codeql.yml). .mvn/ is special-cased as build-relevant:
          # the build copies .mvn/community-maven.settings.xml into Maven settings, so it can affect it.
          SHOULD_RUN=false
          while IFS= read -r file; do
            # .mvn/ affects the Maven build (settings/mirror config); never config-only.
            case "$file" in .mvn/*) SHOULD_RUN=true; break ;; esac
            if echo "$file" | grep -qE '^(\.github/|devops/|docs/|\..*|.*\.md)$'; then
              continue
            fi
            SHOULD_RUN=true
            break
          done <<< "$CHANGED_FILES"

          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          if [ "$SHOULD_RUN" = "true" ]; then
            echo "Build-relevant: code changes detected"
          else
            echo "Skipping build: only config/docs paths changed"
          fi

  java-build:
    name: "🔨 Java Build"
    needs: [check-initialization, check-repo-state, check-paths]
    # Skip java-build for Dependabot PRs (handled by dependabot-validation.yml)
    # and for docs/config-only PRs (check-paths.should_run == 'false').
    if: |
      needs.check-repo-state.outputs.is_initialized == 'true' &&
      needs.check-repo-state.outputs.is_java_repo == 'true' &&
      needs.check-paths.outputs.should_run == 'true' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      is_java_project: ${{ steps.build.outputs.is_java_project }}
      build_result: ${{ steps.build.outputs.build_result }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # For pull_request_target, we need to check out the PR head to validate the actual changes
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: "Restore local actions for sync PRs"
        if: |
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.base.ref == 'fork_upstream' &&
          startsWith(github.event.pull_request.head.ref, 'sync/')
        run: |
          set -euo pipefail
          # Sync branches contain only upstream content and don't have local actions.
          # Restore .github/actions/ from main branch to enable validation.
          # This also provides security hardening - we always use trusted actions for validation.
          echo "🔧 Restoring local actions from main branch for sync PR validation..."
          if ! git fetch origin main --depth=1; then
            echo "❌ Failed to fetch 'main' branch from origin. Cannot restore local actions."
            exit 1
          fi
          if ! git checkout origin/main -- .github/actions/; then
            echo "❌ Failed to restore .github/actions/ from origin/main. Cannot proceed with validation."
            exit 1
          fi
          echo "✅ Local actions restored - validation can proceed"

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Cache Maven packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

          
      - name: Setup Maven Settings
        run: |
          mkdir -p ~/.m2
          cp .mvn/community-maven.settings.xml ~/.m2/settings.xml
        
      - name: "Run Java Build"
        id: build
        uses: ./.github/actions/java-build
        env:
          MAVEN_USERNAME: ${{ secrets.OPENGROUP_MAVEN_USERNAME }}
          MAVEN_TOKEN: ${{ secrets.OPENGROUP_MAVEN_TOKEN }}
        with:
          generate_coverage: ${{ github.event_name == 'pull_request' }}
          gitlab_token: ${{ secrets.GITLAB_TOKEN }}
          # Default core,azure (ADR-035); core is activeByDefault, so a bare profile would drop it.
          # MAVEN_PROFILE overrides for services that deviate (e.g. indexer-queue).
          maven_profile: ${{ vars.MAVEN_PROFILE || 'core,azure' }}

  docker-build:
    # Validate-only worker. NOT the required check — the required "🐳 Docker Build" context is the
    # summary job below (docker-build-required), which reports once even when this job is skipped.
    name: "🐳 Docker Build (validate)"
    needs: [check-initialization, check-repo-state, java-build]
    if: needs.java-build.outputs.build_result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read          # no packages: write — runs untrusted Dockerfile content
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # For pull_request_target, check out the PR head to validate the actual Dockerfile
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: "Restore local actions for sync PRs"
        if: |
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.base.ref == 'fork_upstream' &&
          startsWith(github.event.pull_request.head.ref, 'sync/')
        run: |
          set -euo pipefail
          # Sync branches carry only upstream content: no local actions and no canonical
          # build/Dockerfile (ADR-037). Restore both from main so docker validation can run.
          # This also provides security hardening - we always use trusted actions for validation.
          echo "🔧 Restoring local actions and Dockerfile from main branch for sync PR validation..."
          if ! git fetch origin main --depth=1; then
            echo "❌ Failed to fetch 'main' branch from origin. Cannot restore local actions."
            exit 1
          fi
          if ! git checkout origin/main -- .github/actions/ build/; then
            echo "❌ Failed to restore .github/actions/ and build/ from origin/main. Cannot proceed with validation."
            exit 1
          fi
          echo "✅ Local actions and Dockerfile restored - validation can proceed"

      - name: "Docker Build (validate-only)"
        uses: ./.github/actions/docker-build
        with:
          push: 'false'                       # validates the Dockerfile compiles; no GHCR login/push
          image_name: ${{ vars.SERVICE_NAME || github.event.repository.name }}
          # Conventional JAR path; the docker-build action auto-discovers the Azure JAR when a deviant
          # module name (e.g. entitlements-v2-azure) doesn't match, so a fresh fork needs no variable.
          # SERVICE_NAME falls back to the repo name; SERVICE_TARGET_JAR forces a specific path (ADR-037).
          jar_file: ${{ vars.SERVICE_TARGET_JAR || format('provider/{0}-azure/target/*-spring-boot.jar', vars.SERVICE_NAME || github.event.repository.name) }}

  docker-push:
    name: "🐳 Docker Push"
    needs: [check-initialization, check-repo-state, java-build, docker-build]
    # §5.5 trust boundary (ADR-036): push to GHCR only on trusted events. The force_full_pipeline
    # arm is declared by W13 (#19); until then it evaluates null and is harmless.
    if: |
      (
        needs.java-build.outputs.build_result == 'success' &&
        github.actor != 'dependabot[bot]' &&
        github.event_name != 'pull_request_target' &&
        github.event_name != 'workflow_dispatch' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      ) || (
        github.event_name == 'workflow_dispatch' &&
        inputs.force_full_pipeline == true
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write         # only this job has registry write
    outputs:
      image_repository: ${{ steps.push.outputs.image_repository }}
      image_digest: ${{ steps.push.outputs.image_digest }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: "Restore local actions for sync PRs"
        if: |
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.base.ref == 'fork_upstream' &&
          startsWith(github.event.pull_request.head.ref, 'sync/')
        run: |
          set -euo pipefail
          # Sync branches contain only upstream content and don't have local actions.
          # Restore .github/actions/ from main branch to enable validation.
          # This also provides security hardening - we always use trusted actions for validation.
          echo "🔧 Restoring local actions from main branch for sync PR validation..."
          if ! git fetch origin main --depth=1; then
            echo "❌ Failed to fetch 'main' branch from origin. Cannot restore local actions."
            exit 1
          fi
          if ! git checkout origin/main -- .github/actions/; then
            echo "❌ Failed to restore .github/actions/ from origin/main. Cannot proceed with validation."
            exit 1
          fi
          echo "✅ Local actions restored - validation can proceed"

      - name: "Docker Build and Push"
        id: push
        uses: ./.github/actions/docker-build
        with:
          push: 'true'
          image_name: ${{ vars.SERVICE_NAME || github.event.repository.name }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Conventional JAR path; the docker-build action auto-discovers the Azure JAR when a deviant
          # module name (e.g. entitlements-v2-azure) doesn't match, so a fresh fork needs no variable.
          # SERVICE_NAME falls back to the repo name; SERVICE_TARGET_JAR forces a specific path (ADR-037).
          jar_file: ${{ vars.SERVICE_TARGET_JAR || format('provider/{0}-azure/target/*-spring-boot.jar', vars.SERVICE_NAME || github.event.repository.name) }}

  code-validation:
    name: "✅ Code Quality Checks"
    needs: [check-initialization, check-repo-state, check-paths, java-build]
    if: |
      always() &&
      needs.check-initialization.outputs.initialized == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # For pull_request_target, we need to check out the PR head to validate the actual changes
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: "Restore local actions for sync PRs"
        if: |
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.base.ref == 'fork_upstream' &&
          startsWith(github.event.pull_request.head.ref, 'sync/')
        run: |
          set -euo pipefail
          # Sync branches contain only upstream content and don't have local actions.
          # Restore .github/actions/ from main branch to enable validation.
          # This also provides security hardening - we always use trusted actions for validation.
          echo "🔧 Restoring local actions from main branch for sync PR validation..."
          if ! git fetch origin main --depth=1; then
            echo "❌ Failed to fetch 'main' branch from origin. Cannot restore local actions."
            exit 1
          fi
          if ! git checkout origin/main -- .github/actions/; then
            echo "❌ Failed to restore .github/actions/ from origin/main. Cannot proceed with validation."
            exit 1
          fi
          echo "✅ Local actions restored - validation can proceed"

      - name: "Validate Commit Messages"
        if: |
          needs.check-repo-state.outputs.is_initialized == 'true' &&
          github.actor != 'dependabot[bot]' &&
          github.actor != 'copilot' &&
          !contains(github.actor, 'copilot') &&
          !contains(github.event.pull_request.user.login, 'copilot') &&
          github.base_ref == 'main' &&
          !contains(github.head_ref, 'fork_') &&
          !startsWith(github.event.pull_request.title, 'chore(sync)') &&
          !startsWith(github.event.pull_request.title, '⬆️ Sync with upstream') &&
          !startsWith(github.event.pull_request.title, '🚀 Production Release: Upstream Integration') &&
          !startsWith(github.head_ref, 'release/upstream-') &&
          !startsWith(github.head_ref, 'release-please--branches--')
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
        
      - name: "Check for Merge Conflicts"
        run: |
          if git diff --check; then
            echo "No conflict markers found"
          else
            echo "::error::Conflict markers found in files"
            exit 1
          fi
          
      - name: "Verify Branch Status"
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git fetch origin
          BASE_BRANCH="origin/$BASE_REF"
          CURRENT_BRANCH="origin/$HEAD_REF"

          git fetch origin "$BASE_REF"
          git fetch origin "$HEAD_REF"
          
          if ! git rev-parse --verify "$BASE_BRANCH" >/dev/null 2>&1; then
            echo "::error::Base branch $BASE_BRANCH not found"
            exit 1
          fi

          if ! git rev-parse --verify "$CURRENT_BRANCH" >/dev/null 2>&1; then
            echo "::error::Current branch $CURRENT_BRANCH not found"
            exit 1
          fi

          BEHIND_BY=$(git rev-list --count "$CURRENT_BRANCH..$BASE_BRANCH")
          
          if [ "$BEHIND_BY" -gt 0 ]; then
            echo "::error::Branch is behind $BASE_BRANCH by $BEHIND_BY commits. Please update your branch."
            exit 1
          fi

      - name: "Prepare Validation Report"
        id: status
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        run: |
          # Initialize empty array
          ITEMS="[]"
          
          # Add basic checks
          ITEMS=$(echo "$ITEMS" | jq '. + ["✓ No Merge Conflicts"]')
          ITEMS=$(echo "$ITEMS" | jq '. + ["✓ Branch is Up-to-date"]')
          
          # Handle Dependabot PRs differently
          if [[ "${{ github.actor }}" == "dependabot[bot]" ]]; then
            ITEMS=$(echo "$ITEMS" | jq '. + ["ℹ️ Dependabot Build Handled by dependabot-validation.yml"]')
          # For all other PRs (including sync PRs), report build status
          elif [[ "${{ needs.check-repo-state.outputs.is_initialized }}" == "true" ]]; then
            if [[ "${{ needs.check-repo-state.outputs.is_java_repo }}" == "true" ]]; then
              if [[ "${{ needs.java-build.result }}" == "success" ]]; then
                ITEMS=$(echo "$ITEMS" | jq '. + ["✓ Java Build Successful"]')
              elif [[ "${{ needs.java-build.result }}" == "skipped" && "${{ needs.check-paths.outputs.should_run }}" == "false" ]]; then
                # Build gated out by check-paths: only config/docs paths changed, nothing to build.
                # A skip for any other reason (e.g. check-paths itself failed) falls through to "Failed".
                ITEMS=$(echo "$ITEMS" | jq '. + ["ℹ️ Java Build Skipped (no build-relevant changes)"]')
              else
                ITEMS=$(echo "$ITEMS" | jq '. + ["❌ Java Build Failed"]')
              fi
            else
              ITEMS=$(echo "$ITEMS" | jq '. + ["ℹ️ Non-Java Repository"]')
            fi
          else
            ITEMS=$(echo "$ITEMS" | jq '. + ["ℹ️ Repository Not Yet Initialized"]')
          fi

          # Set output with proper JSON escaping
          echo "items=$(echo "$ITEMS" | jq -c '.')" >> $GITHUB_OUTPUT

      - name: "Post PR Status"
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        uses: ./.github/actions/pr-status
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
          status_items: ${{ steps.status.outputs.items }}

  docker-build-required:
    # Required branch-protection check "🐳 Docker Build" (ADR-030 summary-job pattern, mirrors the
    # CodeQL summary job). Consolidates the validate-only build into one always-reporting context so
    # the required check never wedges (config-only/non-Java/dependabot/uninitialized all pass) and a
    # real build failure blocks. Suppressed on pull_request_target so the dual trigger reports it once.
    name: "🐳 Docker Build"
    needs: [check-initialization, check-repo-state, check-paths, java-build, docker-build]
    if: always() && github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: "Report Docker Build Status"
        run: |
          # Fail the required check if any validation prerequisite genuinely failed/cancelled — a
          # broken validation pipeline must not pass as "skipped". A *skipped* prerequisite is
          # legitimate (wrong-event dedup or an uninitialized repo) and is handled by the output
          # checks below, which is why we test result == failure/cancelled, not result != success.
          if [ "${{ needs.check-initialization.result }}" = "failure" ] || [ "${{ needs.check-initialization.result }}" = "cancelled" ] || \
             [ "${{ needs.check-repo-state.result }}" = "failure" ] || [ "${{ needs.check-repo-state.result }}" = "cancelled" ] || \
             [ "${{ needs.check-paths.result }}" = "failure" ] || [ "${{ needs.check-paths.result }}" = "cancelled" ]; then
            echo "❌ A validation prerequisite job failed or was cancelled"; exit 1
          fi
          if [ "${{ needs.check-initialization.outputs.initialized }}" != "true" ]; then
            echo "✅ Docker Build skipped - repository not yet initialized"; exit 0
          fi
          if [ "${{ needs.check-paths.outputs.should_run }}" = "false" ]; then
            echo "✅ Docker Build skipped - only configuration/docs files changed"; exit 0
          fi
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "✅ Docker Build skipped - Dependabot build handled by dependabot-validation.yml"; exit 0
          fi
          if [ "${{ needs.check-repo-state.outputs.is_java_repo }}" != "true" ]; then
            echo "✅ Docker Build skipped - non-Java repository"; exit 0
          fi
          if [ "${{ needs.java-build.result }}" = "failure" ] || [ "${{ needs.java-build.result }}" = "cancelled" ]; then
            echo "❌ Java build failed or was cancelled"; exit 1
          fi
          if [ "${{ needs.docker-build.result }}" = "failure" ] || [ "${{ needs.docker-build.result }}" = "cancelled" ]; then
            echo "❌ Docker build failed or was cancelled"; exit 1
          fi
          echo "✅ Docker Build checks completed successfully"

  # ──────────────────────────────────────────────────────────────────────────────
  # Deploy lane (W5b). Appended after docker-push; both jobs consume the trusted
  # push job's digest and replicate its §5.5 trust-boundary if: (defense in depth --
  # they also needs:[docker-push], which is itself trust-gated). The extra
  # `vars.AZURE_CLIENT_ID != ''` conjunct makes un-onboarded forks SKIP these jobs
  # cleanly (no red azure/login failure) until `spi onboard` has run -- onboarding
  # writes AZURE_CLIENT_ID as both a secret and a variable for exactly this gate.
  # ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to spi-stack"
    needs: [check-initialization, check-repo-state, java-build, docker-push]
    if: |
      (
        needs.java-build.outputs.build_result == 'success' &&
        vars.AZURE_CLIENT_ID != '' &&
        github.actor != 'dependabot[bot]' &&
        github.event_name != 'pull_request_target' &&
        github.event_name != 'workflow_dispatch' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      ) || (
        github.event_name == 'workflow_dispatch' &&
        inputs.force_full_pipeline == true &&
        vars.AZURE_CLIENT_ID != ''
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # mint the OIDC token for azure/login
      contents: read
    # Per-service lock (not cluster-wide): two services deploy in parallel, two PRs
    # for the SAME service queue. cancel-in-progress: false -- never abandon a rollout.
    concurrency:
      group: spi-stack-${{ vars.SERVICE_NAME || github.event.repository.name }}
      cancel-in-progress: false
    outputs:
      previous_digest: ${{ steps.deploy.outputs.previous_digest }}
      deployed_digest: ${{ steps.deploy.outputs.deployed_digest }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: "Install kubectl"
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: "Install kubelogin"
        uses: azure/use-kubelogin@0ce7c36141aa27d4934872cf00b0120804c98a29  # v1.3
        with:
          kubelogin-version: 'v0.1.4'
      - name: "Deploy to spi-stack (by digest)"
        id: deploy
        uses: ./.github/actions/aks-deploy
        with:
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          aks_resource_group: ${{ vars.AKS_RESOURCE_GROUP }}
          aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}
          namespace: ${{ vars.K8S_NAMESPACE }}
          flux_namespace: ${{ vars.FLUX_NAMESPACE }}
          deployment_name: ${{ vars.K8S_DEPLOYMENT_NAME }}
          container_name: ${{ vars.K8S_CONTAINER_NAME }}
          image_repository: ${{ needs.docker-push.outputs.image_repository }}
          image_digest: ${{ needs.docker-push.outputs.image_digest }}

  integration-test:
    name: "🧪 Integration Tests"
    needs: [check-initialization, check-repo-state, java-build, docker-push, deploy]
    if: |
      (
        needs.java-build.outputs.build_result == 'success' &&
        vars.AZURE_CLIENT_ID != '' &&
        github.actor != 'dependabot[bot]' &&
        github.event_name != 'pull_request_target' &&
        github.event_name != 'workflow_dispatch' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      ) || (
        github.event_name == 'workflow_dispatch' &&
        inputs.force_full_pipeline == true &&
        vars.AZURE_CLIENT_ID != ''
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    # Same per-service lock as the deploy job: a run must hold the cluster from
    # deploy through integration-test so a superseded run's deploy cannot swap the
    # pod under a running suite. cancel-in-progress: false -- never abandon a run.
    concurrency:
      group: spi-stack-${{ vars.SERVICE_NAME || github.event.repository.name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: "Set up Java"
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: "Install kubectl"
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0
      - name: "Install kubelogin"
        uses: azure/use-kubelogin@0ce7c36141aa27d4934872cf00b0120804c98a29  # v1.3
        with:
          kubelogin-version: 'v0.1.4'
      - name: "Run integration tests"
        uses: ./.github/actions/integration-test
        with:
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          aks_resource_group: ${{ vars.AKS_RESOURCE_GROUP }}
          aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}
          namespace: ${{ vars.K8S_NAMESPACE }}
          deployment_name: ${{ vars.K8S_DEPLOYMENT_NAME }}
          container_name: ${{ vars.K8S_CONTAINER_NAME }}
          gateway_url: ${{ vars.GATEWAY_URL }}
          keyvault_name: ${{ vars.KEYVAULT_NAME }}
          test_dir: ${{ vars.ACCEPTANCE_TEST_DIR }}
          secret_map: ${{ vars.ACCEPTANCE_TEST_SECRET_MAP || '{}' }}
          aad_client_id: ${{ vars.AAD_CLIENT_ID }}
          no_data_access_client_id: ${{ vars.NO_DATA_ACCESS_TESTER_CLIENT_ID }}
          no_data_access_token_env: ${{ vars.NO_DATA_ACCESS_TOKEN_ENV || '' }}
          env_map: ${{ vars.ACCEPTANCE_TEST_ENV_MAP || '{}' }}
          dependencies: ${{ vars.ACCEPTANCE_TEST_DEPENDENCIES || '{}' }}
          maven_profile: ${{ vars.MAVEN_PROFILE || '' }}
          maven_goal: ${{ vars.MAVEN_GOAL || 'verify' }}
          root_token_env: ${{ vars.ROOT_TOKEN_ENV || 'ROOT_USER_TOKEN' }}
          timeout_minutes: ${{ vars.IT_TIMEOUT_MINUTES || '25' }}
          max_attempts: ${{ vars.IT_MAX_ATTEMPTS || '2' }}
          expected_digest: ${{ needs.deploy.outputs.deployed_digest }}