name: GHCR Retention

# Prunes old service-image tags from GHCR per design §8.5:
#   :sha-<short>        delete when older than 30 days
#   :<branch>-snapshot  keep the newest 5 per protected branch
#   :<version> (semver) keep forever (never deleted)
# Scheduled runs prune for real; manual runs default to a dry-run so the policy
# can be observed before it deletes anything.

on:
  schedule:
    - cron: '0 5 * * 1'   # Weekly, Mondays 05:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List candidate deletions without deleting (manual runs default to true)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  retention:
    name: "🧹 Prune GHCR tags"
    if: ${{ vars.INITIALIZATION_COMPLETE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: "Prune old image tags"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Scheduled runs prune for real; manual runs honour the dry_run input (default true).
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ vars.SERVICE_NAME }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          OWNER_LC=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          PKG=$(printf '%s' "${SERVICE_NAME:-$REPO_NAME}" | tr '[:upper:]' '[:lower:]')

          # Org packages live under /orgs/<org>/...; a user's own packages under /user/...
          OWNER_TYPE="$(gh api "/users/${OWNER_LC}" --jq '.type' 2>/dev/null || echo "")"
          if [ "$OWNER_TYPE" = "Organization" ]; then BASE="orgs/${OWNER_LC}"; else BASE="user"; fi

          echo "Package: ${OWNER_LC}/${PKG}  (base: ${BASE}, dry_run: ${DRY_RUN})"

          # New/empty forks have no package yet; a failed read must yield [] (not abort under set -e).
          VERSIONS="$(gh api --paginate "${BASE}/packages/container/${PKG}/versions" 2>/dev/null | jq -s 'add // []' || echo '[]')"
          COUNT="$(echo "$VERSIONS" | jq 'length')"
          if [ "$COUNT" -eq 0 ]; then
            echo "No versions found for ${OWNER_LC}/${PKG}; nothing to do."
            exit 0
          fi

          NOW=$(date -u +%s)
          CUTOFF=$(( NOW - 30 * 24 * 3600 ))

          # Protected = any version carrying a semver tag (e.g. a released image). Excluded from all buckets.
          # Protect any semver-tagged version, including pre-release/build-metadata (e.g. 1.2.3-rc.1, 1.2.3+build.7).
          ELIGIBLE="$(echo "$VERSIONS" | jq '[ .[] | select((.metadata.container.tags // []) | any(test("^v?[0-9]+\\.[0-9]+\\.[0-9]+([-+].*)?$")) | not) ]')"

          # sha-only versions older than 30 days
          SHA_IDS="$(echo "$ELIGIBLE" | jq -r --argjson cutoff "$CUTOFF" '
            .[]
            | select((.metadata.container.tags // []) | length > 0 and all(startswith("sha-")))
            | select((.created_at | fromdateiso8601) < $cutoff)
            | .id')"

          # snapshot versions: keep newest 5 per branch, delete the rest
          SNAP_IDS="$(echo "$ELIGIBLE" | jq -r '
            [ .[] | select((.metadata.container.tags // []) | any(endswith("-snapshot"))) ]
            | group_by([ .metadata.container.tags[] | select(endswith("-snapshot")) ][0])
            | map(sort_by(.created_at) | reverse | .[5:])
            | flatten | .[].id')"

          delete_version() {
            id="$1"; reason="$2"
            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY-RUN would delete version ${id} (${reason})"
              echo "- would delete \`${id}\` — ${reason}" >> "$GITHUB_STEP_SUMMARY"
            else
              if gh api -X DELETE "${BASE}/packages/container/${PKG}/versions/${id}" >/dev/null 2>&1; then
                echo "Deleted version ${id} (${reason})"
                echo "- deleted \`${id}\` — ${reason}" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "::warning::Could not delete version ${id} (${reason}); continuing"
              fi
            fi
          }

          echo "### GHCR retention — ${OWNER_LC}/${PKG} (dry_run: ${DRY_RUN})" >> "$GITHUB_STEP_SUMMARY"
          for id in $SHA_IDS;  do delete_version "$id" "sha-* older than 30 days"; done
          for id in $SNAP_IDS; do delete_version "$id" "snapshot beyond newest 5 per branch"; done
          echo "Retention complete."
